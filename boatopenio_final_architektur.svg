<svg viewBox="0 0 710 475" xmlns="http://www.w3.org/2000/svg"
  font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" role="img">
<title>BoatOpenIO v2 – Hardware-Architektur</title>
<desc>Vier-Platinen-Architektur: Input Board, Main Board, ESP32-Adapterplatine, VCC-Platine.</desc>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#71717a"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="710" height="475" fill="#fafafa"/>

<!-- ── Title ──────────────────────────────────────────────── -->
<text x="355" y="26" text-anchor="middle"
  font-size="14" font-weight="700" fill="#18181b">
  BoatOpenIO – Hardware-Architektur v2
</text>
<text x="355" y="42" text-anchor="middle"
  font-size="10" fill="#71717a">
  vier Platinen · 1× ADS1115 · 16 Kanäle über CD74HC4067 MUX
</text>

<!-- ════════════════════════════════════════════════════════
     INPUT BOARD   x=10..158   y=54..314
════════════════════════════════════════════════════════ -->
<rect x="10" y="54" width="148" height="260"
  rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
<text x="84" y="71" text-anchor="middle"
  font-size="10" font-weight="700" fill="#15803d" letter-spacing="0.06em">
  INPUT BOARD
</text>

<!-- Klemmen -->
<rect x="20" y="78" width="128" height="19" rx="3"
  fill="#dcfce7" stroke="#4ade80" stroke-width="0.7"/>
<text x="84" y="91" text-anchor="middle" font-size="9" fill="#166534">
  Klemme 1 – Batterie
</text>

<rect x="20" y="101" width="128" height="19" rx="3"
  fill="#dcfce7" stroke="#4ade80" stroke-width="0.7"/>
<text x="84" y="114" text-anchor="middle" font-size="9" fill="#166534">
  Klemme 2 – Öl-Temp
</text>

<rect x="20" y="124" width="128" height="19" rx="3"
  fill="#dcfce7" stroke="#4ade80" stroke-width="0.7"/>
<text x="84" y="137" text-anchor="middle" font-size="9" fill="#166534">
  Klemme 3 – Öldruck
</text>

<rect x="20" y="147" width="128" height="19" rx="3"
  fill="#dcfce7" stroke="#4ade80" stroke-width="0.7"/>
<text x="84" y="160" text-anchor="middle" font-size="9" fill="#166534">
  Klemme 4 – Tank
</text>

<text x="84" y="181" text-anchor="middle" font-size="13" fill="#86efac">· · ·</text>

<rect x="20" y="186" width="128" height="19" rx="3"
  fill="#dcfce7" stroke="#4ade80" stroke-width="0.7"/>
<text x="84" y="199" text-anchor="middle" font-size="9" fill="#166534">
  Klemme 16 – frei
</text>

<!-- Schutzschaltung -->
<rect x="20" y="214" width="128" height="88" rx="6"
  fill="#f0fdf4" stroke="#4ade80" stroke-width="0.8"/>
<text x="84" y="230" text-anchor="middle"
  font-size="10" font-weight="600" fill="#15803d">Schutzschaltung</text>
<text x="84" y="245" text-anchor="middle" font-size="9" fill="#166534">
  Bourns 4116R-1-102LF
</text>
<text x="84" y="258" text-anchor="middle" font-size="9" fill="#166534">
  Widerstandsnetzwerk DIL-16
</text>
<text x="84" y="271" text-anchor="middle" font-size="9" fill="#166534">
  SP0503BAHTG Zener-Array
</text>
<text x="84" y="284" text-anchor="middle" font-size="9" fill="#4ade80">
  3.3 V Clamp · alle 16 Signale
</text>

<!-- IDC-Buchse rechts am Input Board -->
<rect x="146" y="190" width="12" height="22" rx="2"
  fill="#e4e4e7" stroke="#a1a1aa" stroke-width="0.8"/>

<!-- ── Ribbon 20-pin ──────────────────────────────────── -->
<text x="176" y="186" text-anchor="middle" font-size="8" fill="#52525b">20-pin IDC</text>
<line x1="158" y1="201" x2="196" y2="201"
  stroke="#52525b" stroke-width="4" stroke-linecap="round"/>

<!-- ════════════════════════════════════════════════════════
     MAIN BOARD   x=196..395   y=54..314
════════════════════════════════════════════════════════ -->
<rect x="196" y="54" width="199" height="260"
  rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
<text x="295" y="71" text-anchor="middle"
  font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.06em">
  MAIN BOARD
</text>

<!-- IDC-Buchse links am Main Board -->
<rect x="196" y="190" width="12" height="22" rx="2"
  fill="#e4e4e7" stroke="#a1a1aa" stroke-width="0.8"/>

<!-- MUX -->
<rect x="208" y="78" width="175" height="64" rx="6"
  fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
<text x="295" y="98" text-anchor="middle"
  font-size="12" font-weight="700" fill="#3730a3">CD74HC4067</text>
<text x="295" y="113" text-anchor="middle" font-size="10" fill="#6366f1">
  16:1 Analogmultiplexer
</text>
<text x="295" y="128" text-anchor="middle" font-size="10" fill="#6366f1">
  S0–S3 ← GPIO 14 · 27 · 26 · 25
</text>

<!-- Pfeil MUX → ADS -->
<line x1="295" y1="142" x2="295" y2="158"
  fill="none" stroke="#71717a" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ADS1115 -->
<rect x="208" y="158" width="175" height="62" rx="6"
  fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
<text x="295" y="178" text-anchor="middle"
  font-size="12" font-weight="700" fill="#1e40af">ADS1115 @ 0x48</text>
<text x="295" y="193" text-anchor="middle" font-size="10" fill="#3b82f6">
  16-bit ADC · nur A0 aktiv
</text>
<text x="295" y="208" text-anchor="middle" font-size="10" fill="#3b82f6">
  Signal vom MUX → I²C → ESP32
</text>

<!-- Trennlinie -->
<line x1="212" y1="226" x2="378" y2="226"
  stroke="#bfdbfe" stroke-width="0.6" stroke-dasharray="3 3"/>

<!-- MPU6050 -->
<rect x="208" y="230" width="175" height="42" rx="6"
  fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
<text x="295" y="249" text-anchor="middle"
  font-size="11" font-weight="700" fill="#0369a1">MPU6050</text>
<text x="295" y="263" text-anchor="middle" font-size="10" fill="#0ea5e9">
  IMU · Pitch / Roll · I²C → ESP32
</text>

<!-- AMS1117 -->
<rect x="208" y="280" width="105" height="28" rx="5"
  fill="#fef9c3" stroke="#facc15" stroke-width="0.8"/>
<text x="260" y="296" text-anchor="middle"
  font-size="10" font-weight="600" fill="#713f12">AMS1117-3.3</text>

<!-- JST-Buchse unten am Main Board (VCC-Platine) -->
<rect x="296" y="307" width="28" height="12" rx="2"
  fill="#e4e4e7" stroke="#a1a1aa" stroke-width="0.7"/>
<text x="310" y="304" text-anchor="middle" font-size="8" fill="#a1a1aa">JST 3-pin</text>

<!-- IDC-Buchse rechts am Main Board -->
<rect x="383" y="157" width="12" height="22" rx="2"
  fill="#e4e4e7" stroke="#a1a1aa" stroke-width="0.8"/>

<!-- ── Ribbon 16-pin ──────────────────────────────────── -->
<text x="407" y="153" text-anchor="middle" font-size="8" fill="#52525b">16-pin IDC</text>
<line x1="395" y1="168" x2="422" y2="168"
  stroke="#52525b" stroke-width="4" stroke-linecap="round"/>

<!-- ════════════════════════════════════════════════════════
     ESP32 ADAPTERPLATINE   x=422..608   y=54..232
════════════════════════════════════════════════════════ -->
<rect x="422" y="54" width="186" height="178"
  rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
<text x="515" y="71" text-anchor="middle"
  font-size="10" font-weight="700" fill="#c2410c" letter-spacing="0.06em">
  ESP32 ADAPTERPLATINE
</text>

<!-- IDC-Buchse links am ESP32-Board -->
<rect x="422" y="157" width="12" height="22" rx="2"
  fill="#e4e4e7" stroke="#a1a1aa" stroke-width="0.8"/>

<!-- DevKitC Chip -->
<rect x="435" y="78" width="162" height="144" rx="6"
  fill="#fed7aa" stroke="#f97316" stroke-width="1.2"/>
<text x="516" y="99" text-anchor="middle"
  font-size="12" font-weight="700" fill="#9a3412">DevKitC-32D</text>
<text x="516" y="114" text-anchor="middle" font-size="10" fill="#c2410c">
  38-pin · ESP32-WROOM-32D
</text>
<text x="516" y="130" text-anchor="middle" font-size="10" fill="#c2410c">
  I²C: SDA 21 · SCL 22
</text>
<text x="516" y="145" text-anchor="middle" font-size="10" fill="#c2410c">
  MUX S0–S3: GPIO 14·27·26·25
</text>
<text x="516" y="160" text-anchor="middle" font-size="10" fill="#c2410c">
  OUT1–8: GPIO 4·5·13·16–19·23
</text>
<text x="516" y="176" text-anchor="middle" font-size="9" fill="#ea580c">
  WiFi · OTA · mDNS · Captive Portal
</text>
<text x="516" y="190" text-anchor="middle" font-size="9" fill="#ea580c">
  MQTT · WebUI · 192.168.4.1
</text>

<!-- ── WiFi Pfeil nach unten ─────────────────────────── -->
<line x1="515" y1="232" x2="515" y2="268"
  fill="none" stroke="#71717a" stroke-width="1.5" marker-end="url(#a)"/>
<text x="537" y="254" text-anchor="start" font-size="9" fill="#71717a">WiFi</text>

<!-- ════════════════════════════════════════════════════════
     MQTT / BoatOS   x=422..700   y=268..348
════════════════════════════════════════════════════════ -->
<rect x="422" y="268" width="278" height="80"
  rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.2"/>
<text x="561" y="292" text-anchor="middle"
  font-size="13" font-weight="700" fill="#5b21b6">MQTT → BoatOS</text>
<text x="561" y="308" text-anchor="middle" font-size="10" fill="#7c3aed">
  boat/io/&lt;sensor&gt; · 1 Topic pro Sensor
</text>
<text x="561" y="323" text-anchor="middle" font-size="10" fill="#7c3aed">
  Auto-Discovery · LWT · Status
</text>
<text x="561" y="337" text-anchor="middle" font-size="9" fill="#a78bfa">
  boatopenio.local
</text>

<!-- ════════════════════════════════════════════════════════
     VCC-PLATINE   x=232..358   y=328..385
     (unterhalb Main Board, kein x-Überlapp mit Input Board)
════════════════════════════════════════════════════════ -->
<!-- Verbindungslinie JST -->
<line x1="310" y1="319" x2="310" y2="328"
  fill="none" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="3 2"/>

<rect x="225" y="328" width="170" height="72"
  rx="7" fill="#fefce8" stroke="#facc15" stroke-width="1"/>
<text x="310" y="346" text-anchor="middle"
  font-size="10" font-weight="700" fill="#713f12">VCC-Platine</text>
<text x="310" y="360" text-anchor="middle" font-size="9" fill="#a16207">
  3-pin JST → Mainboard (5V · 3.3V · GND)
</text>
<text x="310" y="373" text-anchor="middle" font-size="9" fill="#a16207">
  7× JST 2-pin (3.3V) → passive / ESP01 Mini-Boards
</text>
<text x="310" y="386" text-anchor="middle" font-size="9" fill="#a16207">
  3× JST 2-pin (5V)   → Arduino Nano Mini-Boards
</text>

<!-- ════════════════════════════════════════════════════════
     MINI-PLATINEN LEGENDE   x=10..215   y=328..465
════════════════════════════════════════════════════════ -->
<rect x="10" y="328" width="210" height="138"
  rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
<text x="115" y="346" text-anchor="middle"
  font-size="10" font-weight="700" fill="#92400e">Mini-Platinen (je Klemme steckbar)</text>
<text x="20" y="362" font-size="9" fill="#78350f">
  VT  – Spannungsteiler  (12V VDO-Geber)
</text>
<text x="20" y="376" font-size="9" fill="#78350f">
  PD / PU  – Pull-down / Pull-up
</text>
<text x="20" y="390" font-size="9" fill="#78350f">
  ST  – Schmitt-Trigger  (Drehzahl AC)
</text>
<text x="20" y="404" font-size="9" fill="#78350f">
  ISP – Impulsplatine  (Arduino Nano / ESP01)
</text>
<text x="20" y="418" font-size="9" fill="#78350f">
  OPT – Optokoppler  ·  DIR – direktes Signal
</text>
<text x="20" y="432" font-size="9" fill="#78350f">
  GND – Massekollektoren
</text>
<text x="20" y="448" font-size="9" fill="#92400e">
  → Pull-Request für eigene Boards willkommen
</text>

</svg>
